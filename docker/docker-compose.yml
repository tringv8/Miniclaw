x-common-config: &common-config
  image: miniclaw
  build:
    context: .
    dockerfile: Dockerfile
    args:
      MINICLAW_REPO: ${MINICLAW_REPO:-https://github.com/tringv8/Miniclaw.git}
      MINICLAW_REF: ${MINICLAW_REF:-main}
  volumes:
    - miniclaw-data:/root/.miniclaw
  env_file:
    - .env

services:
  miniclaw-gateway:
    container_name: miniclaw-gateway
    <<: *common-config
    command: ["gateway"]
    restart: unless-stopped
    ports:
      - 18790:18790
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  miniclaw-launcher:
    container_name: miniclaw-launcher
    <<: *common-config
    entrypoint: ["miniclaw-launcher"]
    command: ["--public", "--no-browser", "--port", "18801"]
    restart: unless-stopped
    ports:
      - 18801:18801
      - 1455:1455   # OAuth local callback server

  miniclaw-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true

volumes:
  miniclaw-data:
